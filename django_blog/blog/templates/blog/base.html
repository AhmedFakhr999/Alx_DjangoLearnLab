<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}My Django Blog{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'blog/css/style.css' %}" />
  </head>
  <body>
    <header>
      <h1>Django Blog Platform</h1>
      <nav>
        <a href="/">Home</a>
      </nav>
      <form action="{% url 'search' %}" method="get">
        <input type="text" name="q" placeholder="Search posts or tags..." />
        <button type="submit">Search</button>
      </form>
    </header>

    <main>{% block content %} {% endblock %}</main>

    <footer>
      <p>&copy; 2026 Alx_DjangoLearnLab</p>
    </footer>
  </body>
</html>
