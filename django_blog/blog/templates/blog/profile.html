{% extends 'blog/base.html' %} {% block content %}
<h2>Your Profile</h2>
<form method="post">
  {% csrf_token %}
  <p><strong>Username:</strong> {{ user.username }}</p>
  <label for="email">Email:</label>
  <input type="email" name="email" value="{{ user.email }}" />
  <button type="submit">Update Profile</button>
</form>
{% endblock %}
