{% extends "blog/base.html" %}
{% block content %}
  {% for post in posts %}
    <div class="post">
      <h2><a href="{% url 'post-detail' post.pk %}">{{ post.title }}</a></h2>
      <p>{{ post.content|truncatewords:30 }}</p>
      <small>By {{ post.author }} on {{ post.published_date }}</small>
    </div>
  {% endfor %}
{% endblock %}
